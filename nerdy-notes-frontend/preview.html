<!doctype html>
<html>
  <head>
    <title>Preview Note</title>

    <style>
      body {
        margin: 0;
        background: #0f172a;
        height: 100vh;
      }

      #pdfViewer {
        width: 100%;
        height: 100vh;
        border: none;
      }
    </style>
  </head>

  <body>
    <iframe id="pdfViewer"></iframe>

    <script>
    const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (id) {
  const url = `https://nerdy-notes-backend.onrender.com/api/notes/preview/${id}`;

  document.getElementById("pdfViewer").src = url + "#toolbar=0";
}
      // Disable right click
      document.addEventListener("contextmenu", function (e) {
        e.preventDefault();
      });

      // Disable Ctrl+S
      document.addEventListener("keydown", function (e) {
        if (e.ctrlKey && (e.key === "s" || e.key === "S")) {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
