<!doctype html>
<html>
  <head>
    <title>Preview Note</title>

    <style>
      body {
        margin: 0;
        background: #0f172a;
        height: 100vh;
        user-select: none;
      }

      #pdfViewer {
        width: 100%;
        height: 100vh;
        border: none;
      }

      .watermark {
  position: fixed;
  top: 30%;
  left: 10%;
  font-size: 30px;
  opacity: 0.08;
  transform: rotate(-20deg);
  pointer-events: none;
}
    </style>
  </head>

  <body>
    <iframe id="pdfViewer"></iframe>
    <div class="watermark">NerdyNotes • User</div>

    <script>
    const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (id) {
  const url = `https://nerdy-notes-backend.onrender.com/api/notes/preview/${id}`;

  document.getElementById("pdfViewer").src = url + "#toolbar=0";
}
  // Disable right click
document.addEventListener("contextmenu", (e) => e.preventDefault());

// Disable Ctrl+S, Ctrl+P
document.addEventListener("keydown", (e) => {
  if (
    (e.ctrlKey && (e.key === "s" || e.key === "S")) ||
    (e.ctrlKey && (e.key === "p" || e.key === "P"))
  ) {
    e.preventDefault();
  }
});

// Block text selection
document.addEventListener("selectstart", (e) => e.preventDefault());
    </script>
  </body>
</html>
