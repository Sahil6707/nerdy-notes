<!DOCTYPE html>
<html>
<head>
<title>Preview Note</title>

<style>
body{
margin:0;
background:#0f172a;
}

iframe{
width:100%;
height:100vh;
border:none;
}
</style>

</head>

<body>

<iframe id="pdfViewer"></iframe>

<script>

const params = new URLSearchParams(window.location.search);
let file = params.get("file");

if(file){

  if(file.startsWith("http://")){
    file = file.replace("http://","https://");
  }

  document.getElementById("pdfViewer").src = file;
}

</script>
</body>
</html>
